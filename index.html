<!DOCTYPE html>
<html lang="sa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>पिङ्गलछन्दःशास्त्रम् — Piṅgala Chandaḥśāstram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:      #fdf8f0;
  --parchment:  #f5ead8;
  --aged:       #ede0c4;
  --border:     #c9a96e;
  --border-lt:  #ddc99a;
  --ink:        #1c140c;
  --ink-mid:    #4a3728;
  --ink-muted:  #7a6250;
  --red:        #8b1a1a;
  --red-lt:     #b02a2a;
  --gold:       #9a7b2e;
  --gold-lt:    #c4a23a;
  --sidebar:    #1e130a;
  --sidebar2:   #2b1c10;
  --slink:      #d4b87a;
  --slink-h:    #f0d49a;
  --active-bg:  #3d2a18;
  --tag-bg:     rgba(139,26,26,0.08);
  --tag-border: #c9a96e;
  font-size: 16px;
}

body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════════
   SPLASH / LANDING PAGE
══════════════════════════════════════════ */
#splash {
  min-height: 100vh;
  background: var(--sidebar);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}
#splash::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 40%, rgba(180,130,50,0.12) 0%, transparent 65%);
  pointer-events: none;
}
.splash-ornament {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: 0.3em;
  margin-bottom: 2rem;
  opacity: 0.7;
}
.splash-om {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 4.5rem;
  color: var(--gold-lt);
  line-height: 1;
  margin-bottom: 1.5rem;
  text-shadow: 0 0 60px rgba(196,162,58,0.4);
}
.splash-title {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  color: #e8d5a8;
  text-align: center;
  line-height: 1.4;
  margin-bottom: 0.6rem;
}
.splash-title-iast {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: clamp(0.85rem, 2vw, 1.1rem);
  color: var(--border);
  letter-spacing: 0.2em;
  text-align: center;
  margin-bottom: 2rem;
}
.splash-divider {
  width: 320px; max-width: 90vw;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  margin: 0 auto 2rem;
}
.splash-shlokas {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: clamp(0.9rem, 2.2vw, 1.15rem);
  color: #c0a878;
  text-align: center;
  line-height: 2.1;
  max-width: 680px;
  margin-bottom: 3rem;
}
.splash-shlokas .shloka-line {
  display: block;
  padding: 0.1rem 0;
}
.splash-shlokas .shloka-num {
  font-size: 0.8em;
  color: var(--gold);
  margin-left: 0.4rem;
}
.btn-enter {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.3rem;
  color: var(--ink);
  background: linear-gradient(135deg, var(--gold-lt), var(--gold));
  border: none;
  padding: 0.9rem 3rem;
  cursor: pointer;
  letter-spacing: 0.05em;
  border-radius: 2px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(196,162,58,0.3);
  transition: all 0.25s;
  position: relative;
}
.btn-enter:hover {
  background: linear-gradient(135deg, #dfc050, var(--gold-lt));
  box-shadow: 0 6px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(220,190,80,0.5);
  transform: translateY(-1px);
}
.btn-enter-sub {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--ink-muted);
  margin-top: 0.8rem;
  text-align: center;
}

/* ══════════════════════════════════════════
   MAIN APP SHELL (hidden until enter)
══════════════════════════════════════════ */
#app {
  display: none;
  flex: 1;
  flex-direction: column;
  min-height: 100vh;
}

/* TOP BAR */
#topbar {
  background: var(--sidebar);
  border-bottom: 2px solid var(--gold);
  display: flex;
  align-items: center;
  padding: 0.7rem 1.2rem;
  gap: 1rem;
  position: sticky; top: 0; z-index: 200;
}
#topbar .logo {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.25rem;
  color: #e8d5a8;
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
}
#topbar .logo span {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.65rem;
  color: var(--border);
  letter-spacing: 0.15em;
  display: block;
  margin-top: -2px;
}
.topbar-sep {
  width: 1px; height: 28px;
  background: #3a2a1a; flex-shrink: 0;
}
#search-wrap {
  flex: 1; display: flex; gap: 0.5rem; max-width: 420px;
}
#search-wrap input {
  flex: 1;
  background: #2b1c10;
  border: 1px solid #4a3020;
  color: #e8d5a8;
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.95rem;
  padding: 0.4rem 0.8rem;
  outline: none;
  border-radius: 2px;
}
#search-wrap input::placeholder { color: #6a5040; }
#search-wrap input:focus { border-color: var(--gold); }
#search-wrap button {
  background: #3a2a18;
  border: 1px solid #6a5030;
  color: var(--slink);
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  border-radius: 2px;
}
#search-wrap button:hover { background: var(--active-bg); color: var(--slink-h); }
#btn-home-top {
  margin-left: auto;
  background: none; border: none;
  color: var(--border);
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  padding: 0.3rem 0.6rem;
  border: 1px solid #3a2a1a;
  border-radius: 2px;
}
#btn-home-top:hover { color: var(--slink-h); border-color: #5a4030; }

/* LAYOUT */
#shell {
  display: flex; flex: 1; min-height: 0;
}

/* SIDEBAR */
#sidebar {
  width: 260px; min-width: 220px;
  background: var(--sidebar);
  border-right: 1px solid #3a2a14;
  overflow-y: auto;
  position: sticky;
  top: 54px;
  height: calc(100vh - 54px);
  padding-bottom: 2rem;
  scrollbar-width: thin;
  scrollbar-color: #3a2a18 var(--sidebar);
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: var(--sidebar); }
#sidebar::-webkit-scrollbar-thumb { background: #3a2a18; }

.nav-head {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--gold);
  padding: 1.1rem 1.2rem 0.35rem;
  text-transform: uppercase;
  border-top: 1px solid #2e1e10;
}
.nav-head:first-child { border-top: none; }

.nav-a {
  display: block;
  padding: 0.48rem 1.2rem 0.48rem 1.4rem;
  color: #b8a07a;
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.88rem;
  text-decoration: none;
  border-left: 3px solid transparent;
  line-height: 1.45;
  cursor: pointer;
  transition: all 0.12s;
}
.nav-a:hover { background: #2b1c10; color: var(--slink-h); border-left-color: var(--gold); }
.nav-a.active { background: var(--active-bg); color: var(--slink-h); border-left-color: var(--red); }
.nav-a .nav-num {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.7rem;
  color: var(--gold);
  margin-right: 0.35rem;
}
.nav-sub {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  background: #170e07;
}
.nav-sub.open { max-height: 2000px; }
.nav-sub .nav-a {
  padding-left: 2.2rem;
  font-size: 0.82rem;
  color: #9a8060;
}
.nav-sub .nav-a:hover { color: var(--slink); }
.nav-sub .nav-a.active { color: var(--slink-h); }

/* MAIN */
#main {
  flex: 1;
  overflow-y: auto;
  background: var(--cream);
}

/* VIEWS */
.view { display: none; animation: fadeUp 0.25s ease; }
.view.show { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════════
   ADHYAYA LIST VIEW
══════════════════════════════════════════ */
#view-adhyaya-list {
  padding: 2rem 2.5rem 3rem;
  max-width: 860px;
}
.view-title {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.7rem;
  color: var(--red);
  margin-bottom: 0.3rem;
}
.view-sub {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  color: var(--ink-muted);
  margin-bottom: 0.7rem;
}
.view-desc {
  font-size: 0.97rem;
  color: var(--ink-muted);
  font-style: italic;
  line-height: 1.85;
  margin-bottom: 2rem;
  border-left: 3px solid var(--border-lt);
  padding-left: 1rem;
}
.adhyaya-card {
  border: 1px solid var(--border-lt);
  border-top: 3px solid var(--red);
  background: var(--parchment);
  margin-bottom: 1rem;
  padding: 1.1rem 1.4rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  gap: 1.2rem;
  align-items: flex-start;
}
.adhyaya-card:hover {
  background: var(--aged);
  border-left: 4px solid var(--gold);
  border-top-color: var(--red-lt);
}
.ac-num {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.4rem;
  color: var(--red);
  flex-shrink: 0;
  width: 2.5rem;
  padding-top: 0.1rem;
}
.ac-body { flex: 1; }
.ac-dev {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.15rem;
  color: var(--ink);
  margin-bottom: 0.2rem;
}
.ac-iast {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  color: var(--gold);
  margin-bottom: 0.35rem;
}
.ac-topic {
  font-size: 0.9rem;
  color: var(--ink-muted);
  font-style: italic;
}
.ac-count {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.65rem;
  color: var(--border);
  letter-spacing: 0.1em;
  padding-top: 0.3rem;
  flex-shrink: 0;
}

/* ══════════════════════════════════════════
   SUTRA LIST VIEW (one adhyaya)
══════════════════════════════════════════ */
#view-sutra-list {
  padding: 2rem 2.5rem 3rem;
  max-width: 860px;
}
.breadcrumb {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-bottom: 1.2rem;
}
.breadcrumb a {
  color: var(--gold);
  cursor: pointer;
  text-decoration: none;
}
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb .sep { margin: 0 0.45rem; color: var(--border-lt); }

.sutra-row {
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 0;
  border-bottom: 1px solid #e0d0b0;
  padding: 0.95rem 0;
  cursor: pointer;
  transition: background 0.12s;
}
.sutra-row:hover { background: rgba(200,169,110,0.13); padding-left: 0.4rem; }
.sutra-row:last-child { border-bottom: none; }
.sr-num {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.72rem;
  color: var(--red);
  padding-top: 0.2rem;
  line-height: 1.5;
}
.sr-sutra {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.15rem;
  color: var(--ink);
  line-height: 1.6;
}
.sr-type {
  display: inline-block;
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.72rem;
  color: var(--red);
  background: var(--tag-bg);
  border: 1px solid var(--tag-border);
  border-radius: 2px;
  padding: 0.05rem 0.4rem;
  margin-left: 0.5rem;
  vertical-align: middle;
}

/* ══════════════════════════════════════════
   SINGLE SUTRA VIEW
══════════════════════════════════════════ */
#view-sutra {
  max-width: 820px;
  padding: 2rem 2.5rem 4rem;
}
.sutra-header {
  display: flex;
  gap: 1.5rem;
  align-items: flex-start;
  padding-bottom: 1.5rem;
  border-bottom: 2px solid var(--border);
  margin-bottom: 2rem;
}
.sh-ref {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  color: var(--red);
  text-transform: uppercase;
  white-space: nowrap;
  padding-top: 0.3rem;
  min-width: 52px;
}
.sh-sutra-text {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.8rem;
  color: var(--ink);
  line-height: 1.5;
  flex: 1;
}
.sh-sutra-text .prakar {
  font-size: 0.8rem;
  color: var(--red);
  background: var(--tag-bg);
  border: 1px solid var(--tag-border);
  border-radius: 2px;
  padding: 0.08rem 0.5rem;
  margin-left: 0.6rem;
  vertical-align: middle;
  font-family: 'Noto Serif Devanagari', serif;
}

/* Section blocks */
.s-section {
  margin-bottom: 1.6rem;
}
.s-label {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
}
.s-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-lt);
}
.s-content {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.05rem;
  color: var(--ink);
  line-height: 1.9;
  background: var(--parchment);
  border: 1px solid var(--border-lt);
  border-left: 4px solid var(--border);
  padding: 0.9rem 1.2rem;
  border-radius: 2px;
}
.s-content.tika {
  border-left-color: var(--red);
  font-size: 1.02rem;
  line-height: 2.1;
  white-space: pre-wrap;
}
.s-content.adhikara {
  border-left-color: var(--gold);
  font-size: 1rem;
}
.s-content.anuvr {
  border-left-color: #6a9a60;
  font-size: 1rem;
}
.s-empty { color: var(--ink-muted); font-style: italic; font-size: 0.9rem; }

/* NAV ARROWS */
.sutra-nav {
  display: flex;
  gap: 1rem;
  margin-top: 2.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border-lt);
}
.sutra-nav button {
  background: var(--parchment);
  border: 1px solid var(--border);
  color: var(--red);
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.9rem;
  padding: 0.5rem 1.2rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.sutra-nav button:hover { background: var(--aged); border-color: var(--red); }
.sutra-nav button:disabled { opacity: 0.35; cursor: default; }
.sutra-nav .gap { flex: 1; }

/* SEARCH RESULTS */
#view-search {
  padding: 2rem 2.5rem 3rem;
  max-width: 860px;
}
.sr-result {
  border-bottom: 1px solid #e0d0b0;
  padding: 0.9rem 0;
  cursor: pointer;
}
.sr-result:hover { background: rgba(200,169,110,0.1); padding-left: 0.4rem; }
.sr-result .res-ref {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.65rem;
  color: var(--red);
  letter-spacing: 0.1em;
  margin-bottom: 0.2rem;
}
.sr-result .res-sutra {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.1rem;
  color: var(--ink);
  margin-bottom: 0.2rem;
}
.sr-result .res-snippet {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 0.88rem;
  color: var(--ink-muted);
  font-style: italic;
  line-height: 1.6;
}
mark { background: rgba(155,100,30,0.25); color: inherit; border-radius: 2px; }

/* RESPONSIVE */
@media(max-width: 700px) {
  #sidebar { display: none; }
  #view-adhyaya-list, #view-sutra-list, #view-sutra, #view-search { padding: 1.2rem; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     SPLASH PAGE
═══════════════════════════════════════════ -->
<div id="splash">
  <div class="splash-ornament">॥ हरिःॐ॥</div>
  <div class="splash-om">ॐ</div>
  <h1 class="splash-title">पिङ्गलछन्दःशास्त्रम्</h1>
  <p class="splash-title-iast">Piṅgala-Chandaḥśāstram · Mṛtasañjīvanī-Ṭīkayā Saha</p>
  <div class="splash-divider"></div>
  <div class="splash-shlokas" id="splash-shlokas">
    <!-- filled by JS -->
  </div>
  <button class="btn-enter" onclick="enterApp()">प्रविश्यताम्</button>
</div>

<!-- ═══════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════ -->
<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="logo" onclick="showAdhyayaList()">
      पिङ्गलछन्दःशास्त्रम्
    </div>
    <div class="topbar-sep"></div>

<div id="search-wrap" style="margin: 0 auto;">
  <input type="text" id="q" placeholder="सूत्र खोजें… · Search sūtra…" onkeydown="if(event.key==='Enter')doSearch()">
  <button onclick="doSearch()">Search</button>
</div>

<button id="btn-home-top"
  style="margin-left: 0;"
  onclick="document.getElementById('splash').style.display='flex';document.getElementById('app').style.display='none';">
  ← गृहम्
</button>
  </div>

  <div id="shell">
    <!-- SIDEBAR -->
    <nav id="sidebar"></nav>

    <!-- MAIN CONTENT -->
    <div id="main">
      <!-- Adhyaya list -->
      <div id="view-adhyaya-list" class="view show">
        <div class="view-title">पिङ्गलछन्दःशास्त्रम्</div>
        <p class="view-desc" id="intro-text"></p>
        <div id="adhyaya-cards"></div>
      </div>

      <!-- Sutra list for one adhyaya -->
      <div id="view-sutra-list" class="view">
        <div class="breadcrumb">
          <a onclick="showAdhyayaList()">अध्यायसूची</a>
          <span class="sep">›</span>
          <span id="bc-adhyaya"></span>
        </div>
        <div class="view-title" id="sl-title"></div>
        <div class="view-sub" id="sl-sub"></div>
        <div style="height:1.5rem"></div>
        <div id="sutra-rows"></div>
      </div>

      <!-- Single sutra -->
      <div id="view-sutra" class="view">
        <div class="breadcrumb">
          <a onclick="showAdhyayaList()">अध्यायसूची</a>
          <span class="sep">›</span>
          <a id="bc2-adhyaya" onclick=""></a>
          <span class="sep">›</span>
          <span id="bc2-sutra"></span>
        </div>
        <div class="sutra-header">
          <div class="sh-ref" id="sv-ref"></div>
          <div class="sh-sutra-text" id="sv-sutra"></div>
        </div>
        <div id="sv-sections"></div>
        <div class="sutra-nav">
          <button id="btn-prev" onclick="navSutra(-1)">◀ पूर्वसूत्रम्</button>
          <div class="gap"></div>
          <button id="btn-next" onclick="navSutra(1)">उत्तरसूत्रम् ▶</button>
        </div>
      </div>

":""},{"a":4,"n":22,"p":"","s":"त्रिषु गणेषु पादः पथ्याद्ये च","pc":"","av":"आर्या","ad":"ग्लौ","h":"चकारोऽन्त्य इत्यनुकर्षणार्थः । यस्या आर्याया अन्त्येऽर्धे आद्ये च त्रिषु गणेषु पादः समाप्यते, सा आर्या 'पथ्या' नाम भवति । तद्यथा-\nपथ्या-शी व्या-यामी स्त्रीषु जि- तात्मा नरो न रोगी स्यात् ।\nयदि वच-सा मन-सा वा- द्रुह्यति नित्यं न भूते-भ्यः ।।\nपादग्रहणं यत्युपलक्षणार्थम् ।।","t":""},{"a":4,"n":23,"p":"","s":"विपुलान्या","pc":"","av":"","ad":"ग्लौ","h":"यस्य आर्याया अन्त्येऽर्थे, आद्ये वोभयोर्वा त्रिषु गणेषु पादो न विश्राम्यति, सा आर्या 'विपुला' नाम । सा चाद्यन्तोभयपूर्वकत्वात्रिधा भवति । सामान्येन विधानमेतत् ।। तत्रादिविपुला-\nस्निग्ध - च्छाया लावण्यलेपिनी किं चिदवन- तघ्राणा ।\nमुखविपुला सौभाग्यं लभते स्त्रीत्या -ह माण्ड-व्यः ।।\nअन्त्यविपुला-\nचित्तं हरन्ति हरिणी‌दीर्घदृशः कामिनां क-लाला-पैः ।\nनीवी-विमोच- नव्या- जकथित - जघना जघनवि- पु-लाः ॥\nउभयविपुला-\nया स्त्री कुचकल-शनितम्बमण्ड- ले जायते महाविपु-ला ।\nगम्भीरनाभि-रतिदी- पलोचना भवति सा सु-भ-गा।\nअत्रोच्यते - पथ्याविपुलालक्षणयोः सहानवस्थानलक्षणो विरोधः, तेन मिश्रीभावो नास्ति । य एवांशो विपुलयाभिस्पृष्टस्तेनैव पथ्यात्वं नष्टं भवति, उभयाश्रयत्वाच्च पथ्या-लक्षणस्य विपुलायास्तत्रांशेनापि प्रवेशो दुर्लभः । ततश्च पथ्यालक्षणैकांशवैकल्येऽपि तद-न्यमात्रविषयत्वाद्विपुला भवत्येव । पथ्याचपलोश्च विरोधाभावाद्वाध्यबाधकभावो नास्ति । तत्रायं संग्रहः -\n'एकैव भवति पथ्या तिस्रो विपुलाश्चतस्त्र एवं ताः ।\nचपलाभेदैस्त्रिभिरपि भिन्ना इति षोडशार्याः स्युः ॥\nगीतिचतुष्टयमित्थं प्रत्येकं षोडशप्रकारं स्यात् ।\nसाकल्येनार्याणामशीतिरेवं विकल्पाः स्युः ।।'\nतेषामनुक्तोदाहरणान्यूह्यानि ।।","t":""},{"a":4,"n":24,"p":"","s":"चपला द्वितीयचतुर्थों ग्मध्ये जौ","pc":"","av":"","ad":"ग्लौ","h":"मृतसञ्जीवनी-अधिकारोऽयम् । द्वितीयचतुर्थी गणौ मध्यगुरु (।ऽ।) भवतः । प्रथमश्चान्तगुरु (।।ऽ), तृतीयो द्विगुरुः (ऽऽ), पञ्चमश्चादिगुरुः (ऽ।।)। शेषं यथाप्राप्तम् । एवं गकारयोर्मध्ये द्वितीयचतुर्थी जकारौ भवतः, सा आर्या 'चपला' नाम। उदाहरणमग्रतः ।।","t":""},{"a":4,"n":25,"p":"","s":"पूर्वे मुखपूर्वा","pc":"","av":"","ad":"ग्लौ","h":"पूर्वेऽर्धे चपलालक्षणं चेद्भवति, तदास वि-मुक्ता - हा- रं\nव्र-त-मि-व भ-व- तो रिपु स्त्रीणाम् ।।","t":""},{"a":5,"n":1,"p":"","s":"वृत्तम्","pc":"","av":"","ad":"ग्लौ","h":"अधिकारो ऽयमाशास्त्रपरिसमाप्तेः । यदित ऊर्ध्वमनुक्रमिष्यामस्तद् 'वृत्तम्' वेदितव्यम् । तेन प्राक्तनं लौकिकं छन्दोजातं 'जातिः' इत्युच्यते। इत उत्तरं च 'वृत्तम्' । तथा चोक्तम् -\n'पद्यं चतुष्पदी' तच्च वृत्तं जातिरिति द्विधा।' (का०द० १।११)\nगायत्र्यादौ छन्दसि वर्तत इति 'वृत्तम्। तच्च स्थिरगुरुलघ्वक्षरविन्यासमिष्यते । पादेन संयोगात् 'पद्यम्। यथा-आर्यादिच्छन्दः स्वपि पादव्यवस्था नास्तीति पादौ संयुक्तौ, वृत्ते पुनः पृथग्भवत इत्यर्थः । पादेन संयोगाभावात् । तथा चोक्तम् -\n'एकदेशस्थिता जातिवृत्तं गुरुलघुस्थितम्' इति ।।","t":""},{"a":5,"n":2,"p":"","s":"सममर्धसमं विषमं च","pc":"","av":"","ad":"ग्लौ","h":"समसर्वावयवत्वात् 'समम्' । यस्य चत्वारः पादा एकलक्षणयुक्तास्तत् 'समं' वृत्तम् । शेषं च संज्ञानुरूपमेव । तत्रार्धे समे यस्य तत् 'अर्धसमम्' सर्वावयवेभ्यः । अर्धाभ्यां च विगतं समं यस्य तद् 'विषमम्' । एवं त्रिप्रकारमपि वृत्तजातमुक्तम् ।।","t":""},{"a":5,"n":3,"p":"","s":"समं तावत्कृत्वः कृतमर्धसमम्","pc":"","av":"","ad":"ग्लौ","h":"समम्' इति समवृत्तसंख्योच्यते । तयैव गुणितं 'तावत्कृत्वः कृतम्' उच्यते । एतदुक्तं भवति - समवृत्तसंख्यागुणिते समवृत्तसंख्यायाः पिण्डे या संख्या निष्पद्यते, तावत्संख्यमर्धसमं वेदितव्यम् । तत्र गायत्रे छन्दसि समवृत्तसंख्या चतुःषष्टि (६४) रष्टमाध्यायसिद्धा । तस्यां चतुःषष्टि (६४) संख्यागुणितायामर्धसमवृत्त संख्या संपद्यते - चत्वारि सहस्त्राणि, षण्नवतिश्च वृत्तानि । अङ्कतोऽपि (६४ × ६४) = ४०९६ ।।","t":""},{"a":5,"n":4,"p":"","s":"विषमं च","pc":"","av":"","ad":"ग्लौ","h":"अर्धसमं तावत्कृत्वः कृतं 'विषमं' भवति । एतदुक्तं भवति -अर्धसमवृत्तसंख्या (४०९६) अर्धसमवृत्तसंख्यया (४०९६) एव गुणिता विषमवृत्तसंख्या संपद्यते-एका कोटिः, सप्तषष्टिर्लक्षाणि, सप्तसप्ततिसहस्त्राणि, द्वे शते, षोडशोत्तरे । अङ्कतोऽपि (४०९६ × ४०९६) = १६७७७२१६ इति ।।\nसमसमार्धसमोपचितमर्धसमं विषमं च यथाक्रमं समोपचितं समार्धसमाभ्यां चोपचितं वेदिव्यम् ।।","t":""},{"a":5,"n":5,"p":"","s":"राश्यूनम्","pc":"","av":"","ad":"ग्लौ","h":"तद् विषमं वृत्तं (१६७७७२१६) अर्धसमं (४०९६) वा राश्यूनम् (१६७७७२१६-४०९६ = १६७७३१२०) कर्तव्यम् । मूलराशिः (४०९६) समुदायात् (१६७७७२१६) अपवेतव्य इति। कोटिरेका, सप्तषष्टिर्लक्षाणि, त्रिसप्ततिसहस्राणि, विंशत्युत्तरं शतं शुद्धविषमवृत्तस्य संख्या । अङ्कतः १६७७७३१२० । चत्वारि सहस्राणि, द्वात्रिंशचेति शुद्धार्धसमसंख्या। अङ्कतोऽपि (४०९६-६४) = ४०३२ उभयशेषोऽयं राश्यूनमिति ।।","t":""},{"a":5,"n":6,"p":"","s":"ग्लिति समानी","pc":"","av":"","ad":"ग्लौ","h":"गकार (ऽ) लकारा (।) भ्यां यहृतं समाप्यते, तत् 'समानी' नाम । 'पादस्यानुष्टुब्बकम्' (पि०सू० ५।९) इत्यतः सूत्रात् सिंहावलोकितन्यायेनानुष्टुब्ग्रहणमनुवर्तते । तेनाष्टाक्षरः पादो यावद्भिर्गकारलकारैः पूर्यते, तावतामेव ग्रहणम् । तत्रोदाहरणम्-\nवा-स-वो-ऽपि वि-क्र-मे-ण य-त्स-मा-न-तां न या-ति ।\nत-स्य व-ल्ल-भे-श्व-र-स्य के-न तुल्य-ता क्रि-ये-त? ॥\nअपि च ।\nओँ न-मो ज-ना-र्द-ना-य-प-बंध-मो-च-ना-य।\nदु-ष्ट-दै-त्य-म-र्द-ना-य पु-ण्ड-री-क-लो-च-ना-य ।।","t":""},{"a":5,"n":7,"p":"","s":"ल्गिति प्रमाणी","pc":"","av":"","ad":"ग्लौ","h":"लकार (१) गकारा (ऽ) भ्यां यद्वृतं समाप्यते तत् 'प्रमाणी' नाम । 'जरौ 'लगौ' इत्यपरे'। तत्रोदाहरणम् -\nस-रो-ज-यो-नि-र-म्ब-रे र-सा-त-ले त-था-च्यु-तः ।\nत-व प्र-मा-ण-मी-क्षि-तुं क्ष-मौ न तौ ब-भू-व-तुः ।।","t":""},{"a":5,"n":8,"p":"","s":"वितानमन्यत्","pc":"","av":"","ad":"ग्लौ","h":"आभ्यां समानी-प्रमाणीभ्यामन्यदष्टाक्षरपादं छन्दो 'वितानं' नाम । तत्रोदाहरणम् -\nतृष्णां त्य-ज ध-र्म भ-ज पा-पे हृ-द-यं मा कु-रु ।\nइ-ष्टा य-दिल-क्ष्मी-स्त व शि-ष्टा-न-नि-शं सं-श्र-य ।।\nद्वितीयं च-\nह-द-यं य-स्यं वि-शा-लं ग-ग-ना-भो-ग-स-मा-नम् ।\nल-भ-ते-ऽसौ म-णि-चि-त्रं नृ-प-ति-र्मू-र्नि वि-ता-नम् ।।\nअन्यूच्च-\nक-ङ्का-ल-मा-ल-भा-रि-णं कं-द-र्प-द-र्प-हा-रि-णम् ।\nसं-सा-र-ब-न्ध-मो-च-नं व-न्दा-म-हे त्रि-लो-च-नम् ।।\nअपि च-\nत-स्याः स्म-रा-मि सु-न्द-रं च-न्द्रो-प-मा-न-मा-न-नम् ।\nकं-द-र्प-चा-प-भ-ङ्गु-र-भ्रू-वि-भ्र-मो-प-शो-भि-तम् ।।\n(अपि च) -\nअ-न्य-द-तो हि वि-ता-नं श्वे-त-प-टे-न य दु-क्तम् ।\nचि-त्र-प-दा-पिच भौ गौ ते-न ग-ता-र्थ-मि-वै-तत् ।।\nकिं च 'वितानमन्यत्' इति ब्रुवन् सूत्रकारो वितानस्यानेकप्रकारतां दर्शयति । अन्यथा 'वितानं भौ गौ' इत्येव ब्रूयात् ।।","t":""},{"a":5,"n":9,"p":"","s":"पादस्यानुष्टुब्वक्रम्","pc":"","av":"","ad":"ग्लौ","h":"पादस्य' इत्ययमधिकार आसप्तमाध्यायपरिसमाप्तेः । 'अनुष्टुब्वक्रम्' इति च प्राक् पदचतुरूर्ध्वात् (वि०सू० ५।२०) अधिकृतं वेदितव्यम् ।।","t":""},{"a":5,"n":10,"p":"","s":"न प्रथमात्स्नौ","pc":"","av":"","ad":"ग्लौ","h":"प्रतिषेधार्थमिदं सूत्रम् । अत्र वक्रजातौ पादस्य प्रथमादक्षरादूर्ध्व सगण-(।।ऽ) नगणौ (।।।) न कर्तव्यौ ।।","t":""},{"a":5,"n":11,"p":"","s":"द्वितीयचतुर्थयो रश्च","pc":"","av":"","ad":"ग्लौ","h":"द्वितीयचतुर्थयोश्च पादयोः प्रथमादूर्ध्व रेफो (ऽ।ऽ) न कर्तव्य इत्युपदेशः ।।","t":""},{"a":5,"n":12,"p":"","s":"वान्यत्","pc":"","av":"","ad":"ग्लौ","h":"अन्येषां षण्णां गणानां मध्ये यत्किंचित् गणान्तरं प्रथमान्तरं कर्तव्यम् ।।","t":""},{"a":5,"n":13,"p":"","s":"य चतुर्थात्","pc":"","av":"","ad":"ग्लौ","h":"य' इति लुप्तविभक्तिको निर्देशः । पादस्य चतुर्थादक्षरादूर्ध्वं यगणः (।ऽऽ) प्रयोक्तव्यः । सर्वेषामुदाहरणानि -\nन वधारा म्बुसंसि-क्त व सुधागन्धिनिःश्वा-सम् ।\nकिं चिदुन्न तघोणा-ग्रं म ही काम यते व-कम् ।।\nअन्यैरप्युक्तम्-\nनी लोत्पल वनेष्व-द्य च रन्त्यश्चा रुसंरा-वाः ।\nरामाः कौशे यसंवी-ताः प्र नृत्यन्ती-व काद-म्बाः ।।\nतथा-\nदुर्भाषितेऽपि सौभाग्यं प्रायः प्रकुरुते प्री-तिः ।\nमा तुर्मनो हरन्त्ये-व दौ र्लालित्योक्तिभिर्बा-लाः ।।\nइत्यादि ।।","t":""},{"a":5,"n":14,"p":"","s":"पथ्या युजो ज्","pc":"","av":"","ad":"ग्लौ","h":"चतुर्थात्' (पि०सू० ५।१३) इति वर्तते । अत्र वक्रे युजः (२,४) पादस्य चतुर्था दक्षरादूर्ध्व जगणः (।ऽ।) प्रयुज्यते, तद्वक्रं 'पथ्या' नाम । 'य' (।ऽऽ) स्यापवादः । अत्रोदाहरणम् -\nनित्यं नीति निषण्ण-स्य राज्ञो राष्ट्र न सीद-ति ।\nन हि पथ्याशिनः का-ये जायन्ते व्या धिवेद नाः ।।","t":""},{"a":5,"n":15,"p":"","s":"विपरीतैकीयम्","pc":"","av":"","ad":"ग्लौ","h":"उक्तलक्षणाद्विपरीता 'पथ्या' भवतीत्येकीयं मतम्, 'अयुक्पादे चतुर्थादक्षरात् परतो जकारः कर्तव्यः, युक्पादे य एवावतिष्ठते । अत्रोदाहरणम् - \nभर्तुराज्ञा नुवर्ति-नी या स्त्री स्यात्सा गृहे ल-क्ष्मीः ।\nस्व प्रभुत्वा भिमानि-नी विपरीता परित्या-ज्या ।।","t":""},{"a":5,"n":16,"p":"","s":"चपलायुजो न्","pc":"","av":"","ad":"ग्लौ","h":"अयुक् (१,६) पादस्य यदा चतुर्थादक्षरादूर्ध्वं नकारो (।।।) भवति युक्- (२,४) पादे। य (।ऽऽ) एवावतिष्ठते, तदा 'चपला' नाम सानुष्टुव् । तत्रोदाहरणम्-\nक्षीयमाणा ग्रदश-ना व क्रनिर्मा सनासा-ग्रा ।\nकन्यका वाक्यचपला लभते धूर्तसौभाग्यम् ।।","t":""},{"a":5,"n":17,"p":"","s":"विपुला युग्लः सप्तमः","pc":"","av":"","ad":"ग्लौ","h":"अधिकारोऽयम्। 'य चतुर्थात्' (पि०सू० ५।१३) इत्यनेन सर्वत्र यकारे (।ऽऽ) कृते यदा युक् (२,४) पादे सप्तमो वर्णों लघुर्भवति, तदा 'विपुला' नाम सानुष्टुव् ।।\nननु पथ्यालक्षणेऽन्तर्भूतत्वात् पुनरुक्तमेतत् । नैवम्, विपुलावर्गस्येदानीमारभ्यमाण-त्वात्तद्विनानुपपत्तेः । युक् (२,४) पादे सप्तमेन लघुनावश्यमेव भवितव्यम् । प्रथमतृतीययोश्चैतावता यकारस्यापवादः । तथा च वक्ष्यति - 'सर्वतः सैतवस्य' (पि०सू० ५।१८) इत्यादिना । पथ्यायां तु यकार (।ऽऽ) एवावतिष्ठते ।।","t":""},{"a":5,"n":18,"p":"","s":"सर्वतः सैतवस्य","pc":"","av":"","ad":"ग्लौ","h":"सैतवस्याचार्यस्य मतेन युक् (२,४) पादे अयुक् (१,३) पादे च सप्तमो लकार (।) एव कर्तव्यः । अत्रोदाहरणम् -\nसै तवेन पथार्ण वं ती र्णो दश रथात्म जः ।\nर क्षः क्षय करीं पुनः प्रतिज्ञां स्वे न बाहु ना ।।","t":""},{"a":5,"n":19,"p":"","s":"भ्रौ न्तौ च","pc":"","av":"","ad":"ग्लौ","h":"सर्वतः सैतवस्य' (पि०सू० ५।१८) इति निवृत्तम् । 'चपलायुजो न्' (पि०सू० ५।१६) इत्येतस्मादयुग्ग्रहणमनुवर्तते । 'विपुला युग्लः सप्तमः' (पि०सू० ५।१७) इति सर्वमनुवर्तनीयम्। अयुक् (१,३) पादे यदा चतुर्थादक्षरात्परतो यकारं (।ऽऽ) बाधित्वा भकार (ऽ।।) रेफ (ऽ।ऽ) नकार (।।।) तकारा (ऽऽ।) विकल्पेन भवन्ति, तदासौ 'विपुला' नाम । तत्र भकारेण विपुलोदाहरणम् -\nइ यं सखे चन्द्रमुखीस्मि तज्योत्स्ना च मानिनी ।\nइन्दीवराक्षी हृदयं दन्दहीति तथापि मे ।।\n'अयुजः' (पि०सू० ५।१६) इति जातिपक्षे द्वयोरपि पादयोर्ग्रहणम् । व्यक्तिपक्षे पुनरेकस्य । एकपक्षे पुनः प्रथमस्य तृतीयस्य वा। तथा च महाकवीनां प्रयोगाः - \nवटे वटे वैश्रव णः चत्वरे चत्वरे शिवः ।\nपर्वते पर्वते रामः सर्वत्र मधुसूदनः ।। (अग्निपु० ३०५/१४)\nदेवः सजयति श्रीमान् दण्डधारो महामतिः ।\nयस्य प्रसा दाद्भुव नं शाश्वते पथि तिष्ठति ।।\nउपस्थितं प्राञ्जलि ना वि नीतेन गरुत्म ता ।\nना रायणे स्तौमि सदा भक्तानां भयनाश नम् ।।\nइत्यादि ।। \nइदानीं रेफ (ऽ।ऽ) विपुलोदाहरणम्-\nलक्ष्मीपतिं लोकना थं रथाङ्गध  रमच्युतम् ।\nयज्ञेश्वरं शार्ङ्गपा णिं प्रणमामि त्रयीत नुम् ।।\nव्यक्तिपक्षे प्रथमे पादे -\nम हाकविं कालिदा सं व न्दे वाग्देवतां गुरुम् ।\nय ज्ज्ञाने वि श्वमाभाति दर्पणे प्रतिबिम्बवत् ।।\nतृतीये पादे-\nकामिनीभिः सह प्रीतिः कास्मै नाम न रोच ते।\nय दि न स्या द्वारिवी चि चञ्चलं हतजीवि तम् ।।\nइदानीं नकार (।।।) विपुलोदाहरणम्-\nयस्या विभाति विपुला मन्मथस्था नपिण्डिका।\nया चतुःष ष्टिचतु रा सा स्त्री स्यान्नृप वल्लभा ।।\nतथैव भारविः -\nयु युत्सुने व कव चं कि मामुक्त मिदं त्व या? । \nत पस्विनो हि वस ने केवलाजिनवल्क ले ।।\n(किरात० ११।१५)\nव्यक्तिपक्षे कालिदासः-\nअ नाकृष्ट स्य विष यैर् विद्यानां पा रदृश्व नः । \nत स्य धर्म  रतेरा सीद् वृ द्धत्वं ज रसा वि ना ।।\n(र०वं० १।२३)\nतथा च-\nत व मन्त्र कृतो मन्त्रैर् दू रात्सश मितारि भिः । \nप्र त्यादिश्य न्त इव मे दृंष्टलक्ष्यभिदः शराः ।।\n(र०वं० १।६१)\nतथा च-\nत व मन्त्र  कृतो म न्त्रैर् दू रात्सश मितारि भिः ।\nप्र त्यादिश्य न्त इव मे दू (१) ष्टलक्ष्य (४) भिदःश (७) राः ।।\nइदानीं तकार (ऽऽ।) विपुलोदाहरणम्-\nजातिपक्षे-\nव (१) न्दे देवं (४) सोमेश्व (७) रं ज (१) टामुकु (४) टमण्डि (७) तम् ।\nख (१) ट्वाङ्गध (४) रं चन्द्र (७) मः शि (१) खामणि (४) विभूषि (७) तम् ।।\nव्यक्तिपक्षे-\nव (१) न्दे कविं (४) श्रीभार (७) विं लो (१) कसंत (४) मसच्छि (७)दम् ।\nदि (१) वा दीपा (४) इवाभा (७) न्ति य (१) स्याग्रे क (४) वयोऽप (७) रे ।।\nतथान्येषामपि प्रयोगाः -\nलो (१) कवत्त्र (४) तिपत्त (७) व्यो लौ (१) किकोऽर्थः (४) परीक्षा (७) कैः ।\nलो(१) कव्यव (४) हारं प्र (७) ति स (१) दृशौ बा (४) लपण्डि (७) तौ ।। \nइदानीं चकाराकृष्टं मकार (ऽऽऽ) विपुलोदाहरणम् -\nस (१) र्वातिरि (४) क्तं लाव (७) ण्यं बि (१) भ्रती चा (४) रुविभ्र (७) मा।\nस्त्री (१) लोकसृ (४) ष्टिस्त्वयै (७) व निः (१) सामान्य (४) स्य वेध (७) सः ।।\nव्यक्तिपक्षे श्रीकालिदासः -\nम (१) नोभिरा (४) माः शृण्व (७) न्तौ र (१) थनेमि (४) स्वनोन्मु (७) खैः ।\nष (१) ड्जसंवा (४) दिनीः के (७) का द्वि (१) धा भिन्नाः (४) शिखण्डि (७)भिः ।।\n(र०वं० १।३९)\nअ (१) थ प्रदो (४) षे दोष (७) ज्ञः सं (१) वेशाय (४) विशांप (७) तिम् ।\nसू (१) नुः सूनृ (४) तवाक्त्र (७) ष्टु- र्वि (१) ससर्जो (४) र्जितश्रि (७) यम् ।।\n(र०वं० १।९३) मुद्राद्यवच्छिन्नेष्वक्षरेषु यतिः कर्तव्येत्यर्थः सिध्यति । तत्रैषा यत्युपदेशोपनिषद्भवति -\nयतिः सर्वत्र पादान्ते श्लोकार्थे तु विशेषतः ।\nसमुद्रादिपदान्ते, च व्यक्ताव्यक्तविभक्तिके ।।\nक्वचित्तु पदमध्येऽपि समुद्रादौ यतिर्भवेत् ।\nयदि पूर्वापरैः भागौ न स्यातामेकवर्णकौ ।।\nपूर्वान्तवत्स्वरः संधौ क्वचिदेव परादिवत् ।\nद्रष्टव्यो यतिचिन्तायां यणादेशः परादिवत् ।।\nनित्यं प्राक्पदसंबन्धाश्चादयः प्राक्पदान्तवत् ।\nपरेण नित्यसंबन्धाः प्रादयश्च परादिवत् ।।\n'यतिः सर्वत्र पादान्ते' इत्यस्योदाहरणम्- 'विशुद्धज्ञानदेहाय' (मी. श्लो. वा. १।१) इत्यादि । तस्यैव प्रत्युदाहरणम्-\n'नमस्तस्मै महादेवा,-य शशाङ्कार्धधारिणे' इत्यादि ।\n'श्लोकार्थे तु विशेषतः' इत्यत्र संधिकार्याभावः स्पष्टविभक्तिकत्वं च विशेषः ।\nतत्रोदाहरणं यथा-\n'नमस्यामि सदोद्भूतमिन्धनीकृतमन्मथम् । \nईश्वराख्यं परं ज्योतिरज्ञानतिमिरापहम् ।।'\nअत्र 'ईश्वराख्यम्' इत्यस्य पूर्वमकारेण संयोगो न कर्तव्यः । समासे प्रत्युदाहरणं [ यथा-]\n'सुरासुरशिरोरत्नस्फुरत्किरणमञ्जरी' -। पिञ्जरीकृतपादाब्जद्वन्द्वं वन्दामहे शिवम् ।।'\n'समुद्रादिपदान्ते च व्यक्ताव्यक्तविभक्तिके' तत्र श्रूयमाणविभक्त्यन्तं व्यक्तविभक्तिकम् समासान्तर्भूतविभक्त्यन्तमव्यक्तविभक्तिकम् । तत्रोदाहरणं [यथा-]\n'यक्षश्चक्रे जनकतनयास्नानपुण्योदकेषु' (मे.सं. १।१) इत्यादि ।\n'व्यक्ताव्यक्तविभक्तिके' इति 'यतिः सर्वत्र पादान्ते' इत्यनेन संबध्यते। तत्रोदाहरणम्-\n'वशीकृतजगत्कालं कण्ठेकालं नमाम्यहम् । \nमहाकालं कलाशेषशशिलेखाशिखामणिम् ।।'\nअपि च ।\n'नमस्तुङ्गशिरश्चुम्बिचन्द्रचामरचारवे। त्रैलोक्यनगरारम्भमूलस्तम्भाय शम्भवे ।।'\n'क्वचित्तु पदमध्येऽपि समुद्रादौ यतिर्भवेत्। यदि पूर्वापरौ भागौ न स्यातामेकवर्णकौ ।।'\nतत्रोदाहरणम् -\n'पर्याप्तं तप्तचामी, करकटकतटे श्लिष्टशीतेतरांशौ' इत्यादि। तथा- 'कूजत्कोयष्टिकोला, - हलमुखरभुवः प्रान्तकान्तारदेशाः' इत्यादि । तथा- 'हासो हस्ताग्रसंवा, - हनमपि तुलिता, द्रीन्द्रसारद्विषोऽसौ' इत्यादि। तथा- 'वैरिञ्चानां तथोच्चा, -रितरुचिरऋचां चाननानां चतुर्णाम्' इत्यादि । तथा- 'खड्गे पानीयमाह्ला, दयति च महिषं पक्षपाती पृथक्कः' इत्यादि। समुद्रादाविति किम् ?। पदमध्ये यतिः पादान्ते मा भूत् । तद्यथा - 'प्रणमत भवबन्धक्लेशनाशाय नारा, यणचरणसरोजद्वन्द्वमानन्दहेतुम्' इत्यादि ।\nपूर्वोत्तरभागयोरेकाक्षरत्वे तु यतिर्दुष्यति । तत्रोदाहरणम्-\n'एतस्या ग, - ण्डतलममलं गाहते चन्द्रकक्षाम्' इत्यादि । 'एतस्या रा, जति सुमुखमिदं पूर्णचन्द्रप्रकाशम् ।' इत्यादि । तथा- 'सुरासुरशिरोनिघृ, - ष्टचरणारविन्दः शिवः' इत्यादि ।\n'पूर्वान्तवत्स्वरः संधौ क्वचिदेव परादिवत्' । अस्यार्थः - योऽयं पूर्वपरयोरेकादेशः स्वरसंधौ विधीयते, स क्वचित्पूर्वस्यान्तवद्भवति क्वचित्परस्यादिवत् । तथा च पाणिनेः स्मरणम्- 'अन्तादिवच्च' (पा०सू० ६।१।८५) । तत्र पूर्वान्तवद्भावे उदाहरणम् -\n'स्यादस्थानो - पगतयमुनासंगमेवाभिरामा' (मे.सं. १।५१) । 'जम्भारातीभकुम्भोद्भवमिव दधतः' इत्यादि ।\nतथा-\n'दिक्कालाद्यनवच्छिन्ना-नन्तचिन्मात्रमूर्तये ।\nस्वानुभूत्येकमानाय नमः शान्ताय तेजसे ।।' (नौ. श. १) इत्यादि ।\nपरादिवद्भावे उदाहरणम्-\n'स्कन्धं विन्ध्याद्रिबुद्ध्या, निकषति महिष-स्याहितोऽसूनहार्षीत्' इत्यादि ।\n'शूलं शूलं तु गाढं प्रहर हर! हृषीकेश! केशोऽपि वक्र-श्चक्रेणाकारि किं ते' इत्यादि ।\nतत्र हि स्वरस्य परादिवद्भावे व्यञ्जनमपि तद्भक्तत्वात्तदादिवद्भवति ।\n'यदि पूर्वापरौ भागौ न स्यातामेकवर्णकौ' इत्यन्तादिवद्भावविधावपि संबध्यते । तेन 'अस्या वक्रा - ब्जमवजितपू-र्णेन्दुशोभं विभाति' इत्येवंविधा यतिर्न भवति ।\n'यणादेशः परादिवत्' इत्यस्योदाहरणम् -\n'विततघनतुषारक्षोदशुभ्रांशुपूर्वा-स्वविरलपदमालां श्यामलामुल्लिखन्तः' इत्यादि ।\n'नित्यं प्राक्पदसंबन्धाश्चादयः प्राक्पदान्तवत्' । तेभ्यः पूर्वा यतिर्न कर्तव्येत्यर्थः ।\nतत्रोदाहरणम्-\n'स्वादु स्वच्छं च हिमसलिलं प्रीतये कस्य न स्यात्' ? इत्यादि ।\nनित्यं प्राक्पदसंबन्धा इति किम् ? । अन्येषां पूर्वपदान्तवद्भावो मा भूत् । तद् यथा-\n'मन्दायन्ते न खलु सुहृदामभ्युपेतार्थकृत्याः' (मे.सं. १।३८) इत्यादि ।\nतथा- 'इत्यौत्सुक्यादपरिगणयन्गुह्यकस्तं ययाचे' (मे.सं. १।५) इत्यादि ।\n'परेण नित्यसंबन्धाः प्रादयश्च परादिवत्' । तेभ्यः परा यतिर्न भवतीत्यर्थः । तत्रोदाहरणम् -\n'दुःखं मे प्र-क्षिपति हृदये दुःसहस्त्वद्वियोगः' इत्यादि ।\nपरेण नित्यसंबन्धा इति किम् ? । कर्मप्रवचनीयेभ्यः परापि यतिर्यथा स्यात् इति,\nतत्रोदाहरणम्-\n'प्रियं प्रतिस्फुरत्पादे मन्दायन्ते नखत्विषः ।'\n'श्रेयांसि बहुविघ्नानि भवन्ति महतामपि' इत्यादि ।\nअयं तु चादीनां प्रादीनां चैकाक्षरत्वेनैकाक्षराणामेव पादान्ते यतावन्तादिवद्भाव इष्यते, न त्वेनकाक्षराणां पदमध्ये यतौ। तत्र हि पदमध्येऽपि चामीकरादिष्विव यतेरभ्यनुज्ञातत्वात् । तत्र चादीनामुदाहरणम् -\n'प्रत्यादेशादपि च मधुनो विस्मृतभ्रूविलासम्' (मे.सं. २।२८) इति ।\nप्रादीनामुदाहरणम् -\n'द्वारारूढप्रमोदं हसितमिव परिस्पष्टमासा सखीभिः' इत्यादि ।\nन पर्यन्तोऽस्ति वृत्तानां प्रस्तारगणनाविधौ ।\nपूर्वाचार्यकृताभिख्याचिह्नं किंचिदिहोच्यते ।।\n(उक्थायाम्) एकाक्षरायाम्-\nश्रीच्छन्दः (१।१) - श्री सा ।\nजं गो ।। प्रा० पिं० सू० २।१ ।।\n(अत्युक्थायाम्) द्यक्षरायाम् -\nकामच्छन्दः (२।१)- दीहा वीहा।\nकामो रामो ।। प्रा० पिं० सू० २।४ ॥\n('स्त्री' इति नामान्तरं कामस्य च्छन्दः कौस्तुभादौ ।)\nमहीच्छन्दः (२।२)- लगो जहीं।\nमही कही ।। प्रा० पिं० सू० २।८ ॥\nसारुच्छन्दः (२।३) - सारु एह ।\nगो वि रेह ।। प्रा० पि० सू० २।१० ।।\n(चारु-वृत्तचन्द्रिकायाम्)\nमधुच्छन्दः (२।४) - लहु जुअ ।\nमहु धुअ । प्रा० पिं० सू० २।६ ।।\n(मध्यायाम्) त्र्यक्षरायाम् -\nतालीच्छन्दः (३।१) - ताली ए जाणीए । \nगो कण्णो तिब्बण्णो ।। प्रा० पिं० सू० २।१२ ॥\n('नारी' - वृ०र०)\nशशीच्छन्दः (३।२) - ससी यो जणीयो । \nफणींदो भणीओ ।। प्रा० पिं० सू० २।१६ ॥ \n('केसा' - वृ०र०)\nप्रियाच्छन्दः (३।३) - हे पिए लेक्खिए । \nअक्खरे तिण्णि रे ।। प्रा० पिं० सू० २।१४ ॥ \n('मृगी' इति छन्दः कौस्तुभादौ ।)\nरमणच्छन्दः (३।४) - सगणो रमणो । \nसहिओ कहिओ ।। प्रा० पिं० सू० २।१८ ॥\nपञ्चालच्छन्दः (३।५) - तक्कार जं दिट्ठ । \nपंचाल उक्किट्ठ ।। प्रा० पिं० सू० २।२० ॥\nमृगेन्द्रच्छन्दः (३।६) -‌ णरेंद ठवेहु । \nमिएंद करेहु ।। प्रा० पिं० सू० २।२२ ।।\nमन्दरच्छन्दः (३।७) - भो जहि सो सहि । \nमंदर सुंदर ।। प्रा० पिं० सू० २।२४ ।।\nकमलच्छन्दः (३।८) - कमल पभण । \nसुमुहि णगण ।। प्रा० पिं० सू० २।२६ ।।\n(प्रतिष्ठायाम्) चतुरक्षरायाम् -\nतीर्णाच्छन्दः (४।१) - चारी हारा इट्ठा कारा । \nवीए कण्णा जाणे तिण्णा ।। प्रा० पिं० सू० २।२८ ॥\nव्रीडाच्छन्दः (४।२) - यगौ व्रीडा । वृ०र० ३।७\nसमृद्धिच्छन्दः (४।३) - र्गो समृद्धिः । वृ० र० ३।११\nसुमतिच्छन्दः (४।४) - सुमतिः स्गौ । वृ० र० ३।१०\nलासिनीच्छन्दः (४।६) - ज्ग लासिनी। वृ०र० ३।८ ('नगाणिका' प्रा०पिं०सू० २।३२)\nसुमुखीच्छन्दः (४।७) - भ्गौ सुमुखी। वृ०र० ३।९\nघारीच्छन्दः (४।११) - वण्ण चारि मुद्धि घारि ।\nव ंख्याया अतिशदन्तायाःकन्‌’ (पाणि०५।१।२२) इति कन्प्रत्ययः । ततश्च गकारं ततोऽधस्ताल्लकारं लिखित्वा विस्पष्टार्थमधस्तिर्यग्रेखां दद्यात्‌ । अधस्ताच्च पूर्ववद्‌ गकारलकारौ स्थापयेत्‌ ॥","t":""},{"a":8,"n":21,"p":"","s":"मिश्रौ च","pc":"","av":"","ad":"ग्लौ","h":"अनेन द्वितीयाक्षरप्रस्तारं दर्शयति । चकारः पूर्वप्रस्तारसमुच्चयार्थः । द्विकौ ग्लौ स्थापयित्वा अनन्तरं द्वितीयस्थानेषु मिश्रौ ग्लौ विन्यसेत्‌ । गकारो गकारेण संश्लिष्टो मिश्र उच्यते, लकारश्च लकारेण । मिश्राविति गकारलकाराभ्यां प्रत्येकमभिसम्बध्यते । ‘द्वन्द्वात्परो यः श्रूयत’ इति न्यायात्‌ । ततश्च प्रथमायामावृत्तौ गकारौ मिश्रौ स्थापयेत्‌ । द्वितीयायां लकाराविति । ततो मध्ये लेखामपनयेत्‌ । एवं चतुःप्रकारो द्यक्षरप्रस्तारो भवति । तद्यथा—गौ ल्गौ ग्लौ लाविति ॥","t":""},{"a":8,"n":22,"p":"","s":"पृथग्ला मिश्राः","pc":"","av":"","ad":"ग्लौ","h":"द्यक्षरप्रस्तारस्य पूर्वन्यायेन द्विकं लेखाविभक्तं स्थापयित्वा तृतीयाक्षरस्थानेषु प्रथमावृत्तौ गकारा मिश्रा दातव्याः । द्वितीयावृत्तौ लकारा मिश्रास्ततो मध्यात्‌ लेखामपनयेत्‌ । एवं त्रिकः प्रस्तारः सिध्यति । पृथगिति विजातीयासंसर्गमाह । तेन प्रथमायामावृत्तौ न लकारप्रवेशः । द्वितीयायां न गकारस्य । एवं त्रिकप्रस्तारं द्विः स्थापयित्वा पृथग्‌ ग्लौमिश्रा दातव्या इति चतुरक्षरः प्रस्तारः । एवं तत्पूर्वकः पञ्चाक्षरः प्रस्तारः । तथैव तत्पूर्वकः षडक्षरो गायत्रीसमवृत्तप्रस्तारः । एवमुष्णिगादीनामप्येकैकाक्षरवृद्ध्या अयमेव न्यासः । तत्रेदं सूत्रं त्र्यक्षरात्‌ प्रभृति पुनः पुनरावर्तनीयं यावदभिमतः प्रस्तारः ॥","t":""},{"a":8,"n":23,"p":"","s":"वसवस्त्रिकाः","pc":"","av":"","ad":"","h":"एवं पूर्वोक्ते त्र्यक्षरप्रस्तारे अष्टौ त्रिका जायन्ते । ते च मकारादयः शास्त्रादौ कथिता एव । प्रदर्शनार्थ चैतत्‌; तेन षोडश चतुष्का द्वात्रिंशत्पञ्चका भवन्ति | एवं चतुःषष्टिर्गायत्रीसमवृत्तानि सर्वगुरुलघ्वाद्यन्तानि भवन्ति । द्विगुणोत्तरमुष्णिगादीनाम्; एकैकाक्षराधिक्यात्‌ । विस्पष्टार्थमिदं सूत्रम; प्रस्तारादेव सङ्ख्यापरिच्छितेः ॥","t":""},{"a":8,"n":24,"p":"","s":"लर्द्धे","pc":"","av":"","ad":"","h":"यदैवं विजिज्ञासेत गायत्र्यां समवृत्तं षष्ठं कीदृशमिति, तदा तमेव षट्सङ्ख्याविशेषमर्धयेत । तस्मिन्नर्धीकृते लघुरेको लक्ष्यते, स भूमौ विन्यास्यः ॥","t":""},{"a":8,"n":25,"p":"","s":"सैके ग्‌","pc":"","av":"","ad":"","h":"अर्ध इत्यनुवर्तते । विषमसङ्ख्यायामेकमधिकं निक्षिप्य ततोऽर्धयेत । तत्रैको गकारो लभ्यते । तं पूर्वलब्धाल्लकारात्‌ परं स्थापयेत्‌ । ततो द्विसंख्यावशिष्यते । पुनस्तामर्धयेत, ततश्चैकलकारं दद्यात्‌ । ततश्चैकसंख्यावशिष्यते । तत्र तावत्‌ सैके गिति लक्षण मावर्तनीयं यावद्वृत्ताक्षराणि षट्‌ पूर्यन्ते । एवं सङ्ख्यान्तरेऽपि योज्यम्‌ ॥","t":""},{"a":8,"n":26,"p":"","s":"प्रतिलोमगणं द्विर्लाद्यम्","pc":"","av":"","ad":"","h":"यस्य वृत्तस्य सङ्ख्यां जिज्ञासेत तद्भूमौ प्रस्तारयेत । ततस्यस्यान्ते यो लकारः सजातीयापेक्षया, तमादौ कृत्वा प्रातिलोम्येने द्विरावर्तयत । तत्र निराकाराया आवृत्तेरसम्भवात्‌ प्रथमातिक्रमे कारणाभावादेकसङ्ख्या लभ्यते । ततश्चैकसङ्खयाङ्कमन्त्यलकारस्याधस्तात्‌ स्थापयित्वा द्विगुणयेत्‌ । ततस्तस्मादपनीय तत्पूर्वस्य वर्णस्याधस्तान्निधाय पुनर्द्विगुणयेत्‌ । पुनस्तदपि पूर्वस्य । एवं यावन्ति वृत्ताक्षराणि प्रातिलोम्येन समाप्यन्ते । तत्र याः सङ्ख्या निष्पद्यन्ते, तावतिथं तद्वृत्तमिति ॥","t":""},{"a":8,"n":27,"p":"","s":"ततोग्यंकं जह्यात्","pc":"","av":"","ad":"","h":"पूर्वोक्ते कर्मणि क्रियमाणे यदि सा सङ्ख्या गकारस्थानमापद्यते, तदा तां द्विगुणयित्वा ततः सङ्ख्यासमुदायादेकं त्यजेत्‌ । ततः पूर्वोक्तं कर्म कुर्यात्‌ । ततः परिपूर्णत्वात्तद्वृत्तसङ्ख्या सिद्ध्यति॥","t":""},{"a":8,"n":28,"p":"","s":"द्विरर्द्धे","pc":"","av":"","ad":"","h":"अपनीत इत्यध्याहारः । यदा जिज्ञासेत-षडक्षरे छन्दसि कति वृत्तानि भवन्ति? तदा तां छन्दोऽक्षरसङ्ख्यां भूमौ स्थापयित्वा ततोऽर्धमपनयेत । तस्मिन्नपनीते द्वौ लभ्येते । ततस्तां द्विसङ्ख्यां भूमौ पृथक्‌ प्रस्तारयेत । ततः शेषास्त्रयोऽक्षरसङ्ख्यायां भवन्ति ॥","t":""},{"a":8,"n":29,"p":"","s":"रूपे शून्यम्‌","pc":"","av":"","ad":"","h":"विषमसङ्ख्यातो रूपमपनीय तस्मिन्नपनीते शून्यं लभ्यते । तत्रः पूर्वलब्धाया द्विसङ्ख्याया अधस्तात्‌ स्थापयेत्‌, ततो द्विसङ्ख्यावशिष्यते । ततोऽर्धेऽपनीते पुनर्द्विसङ्ख्या लभ्यते, तां शून्याधस्तात्‌ स्थापयेत्‌ । ततो रूपे शून्यं लभ्यते । तद्‌ द्विसङ्ख्याया अधस्तात्‌ स्थापयेत्‌ ॥","t":""},{"a":8,"n":30,"p":"","s":"द्विः शून्ये","pc":"","av":"","ad":"","h":"शून्यस्थाने द्विरावृत्तिं कुर्यात्‌ । तत्र निराकाराया आवृत्तेरसम्भवात्‌, प्रथमातिक्रमे कारणाभावादेकसङ्ख्या लभ्यते । तां शून्ये स्थापयित्वा द्विगुणयेत्‌ । ततो द्वौ भवतः । तस्योपरिष्टादर्धस्थानं द्विसङ्ख्याकं तदपनीय तस्य स्थाने तं द्विसङ्ख्याकं स्थापयेत्‌ ॥","t":""},{"a":8,"n":31,"p":"","s":"तावदर्धे तद्गुणितम्‌","pc":"","av":"","ad":"","h":"यदर्धस्थाने स्थितं सङ्ख्याजातं, तत्तावत्‌ गुणितं कुर्यात्‌ । एतदुक्तं भवति-स्वसङ्ख्ययैव गुणयितव्यमिति । ततो द्वौ द्वाभ्यां गुणितौ चत्वारो भवन्ति । तेषामुपरिष्टाच्छून्यस्थानं तत्र तानारोपयेत्‌ । अनन्तरं द्विःशून्य इति द्विगुणिता अष्टौ भवन्ति । तानप्यर्धस्थाने निधाय तावद्गुणान्‌ कुर्यात्‌ । ततोऽष्टावष्टाभिर्गुणिताश्चतुःषष्टिर्भवन्ति गायत्रीसमवृत्तानि । अनेनैव न्यायेनाष्टाविंशत्यधिकशतमुष्णिह;, षट्पञ्चाशदधिके द्वे शते अनुष्टुभः, द्वदशोत्तराणि पञ्चशतानि बृहत्याः, चतुर्विंशत्यधिकं सहस्र पङ्क्तेः, अष्टचत्वारिंशदधिके द्वे सहस्रे त्रिष्टुभः, षण्णवत्यधिकानि चत्वारि सहस्राणि जगत्याः । एवमतिच्छन्दसां कृतीनां च द्रष्टव्यम्‌ ॥","t":""},{"a":8,"n":32,"p":"","s":"द्विर्द्यूनं तदन्तानाम्‌","pc":"","av":"","ad":"","h":"गायत्र्यादिवृत्तसङ्ख्याजातं द्विगुणीकृत्य द्वाभ्यामूनं कुर्यात्‌ । तत्तदन्तानां\nपरिमाणं भवति । यस्य छन्दसः सङ्ख्या द्विगुणिता, तत्पर्यन्तानां पूर्वेषामेकाक्षरप्रभृतीनां सङ्ख्या भवतीत्यर्थः ॥","t":""},{"a":8,"n":33,"p":"","s":"एकोनेऽध्वा","pc":"","av":"","ad":"","h":"इति सूत्रमधिकं पठ्यते वैदिकैः, अनुवादोऽप्यस्याग्निपुराणे दृश्यते (३३५।४) 'अध्वाङ्गुलमधोऽर्धतः । सङ्ख्यैव द्विगुणैकोना’ इति । एतदभावे च षट्प्रत्ययपूर्तिरपि न भवति, अध्वप्रत्ययाभावात्‌ । न चासावत्रोपेक्षित एवेति साम्प्रतम्‌, शास्त्रवैकल्यापत्तेः; 'षण्मात्रमुवाच पिङ्गलः सूत्रम्‌ ।....परत्ययहेतोः स्वशास्रादौ ॥ इति परिभाषासाङ्गत्यापत्तेश्च । अतः सम्प्रदायशुद्धमावश्यकं चैतत्सूत्रम्‌ । हलायुधेनाव्याख्यानं त्वनुपलब्धत्वादेवेति 'षष्ठप्रत्ययोऽपि' इत्यादितल्लेखादेव व्यक्तम् ।","t":""},{"a":8,"n":34,"p":"","s":"परे पूर्णम्‌","pc":"","av":"","ad":"","h":"तदेतच्छन्दोवृत्तसङ्ख्याजातं द्विगुणितं पूर्णमेव स्थापयितव्यम्‌, न द्वयूनम्‌ । परे छन्दसि जिज्ञासिते । तत्संख्याजातं द्विगुणितं परस्य छन्दसो वृत्तानां संख्या भवति । तद्यथा— चतुःषष्टिर्गायत्रीसमतृत्तानां संख्या द्विगुणीकृता सती परस्योष्णिहः समवृत्तसंख्या साष्टाविंशं शतं भवति ॥","t":""},{"a":8,"n":35,"p":"","s":"परे पूर्णमिति","pc":"","av":"","ad":"","h":"उपरिष्टादेकं चतुरस्रकोष्ठं लिखित्वा तस्याधस्तादुभयतोऽर्धनिष्कान्तं कोष्ठकद्वयं लिखेत्‌ । तस्याप्यधस्तात्रयं तस्याप्यधस्ताच्चतुष्टयं यावदभिमतं स्थानमिति मेरुप्रस्तारः । तस्य प्रथमे कोष्ठे एकसंख्यां व्यवस्थाप्य लक्षणमिदं प्रवर्तयेत्‌ । तत्र परे कोष्ठे यद्वृत्तसंख्याजातं तत्‌ पूर्वकोष्ठयोः पूर्ण निवेशयेत्‌ । तत्रोभयोः कोष्ठकयोरेकैकमड्कं दद्यात्‌, मध्ये कोष्ठे तु परकोष्ठयाङ्कमेकीकृत्य पूर्ण निवेशयेदिति पूर्णशब्दार्थः । चतुर्थ्या पङ्क्तावपि पर्यन्तकोष्ठद्वयोरेकैकमेव स्थापयेत्‌ । मध्यमकोष्ठयोस्तु परकोष्ठद्व्याङ्कमेकीकृत्य पूर्णं त्रिसङ्घयारूपं स्थापयेत्‌ । उत्तरत्राप्ययमेव न्यासः । तत्र द्विकोष्ठायां पङ्क्तौ एकाक्षरस्य विन्यासः । तत्रैकगुर्वेकलघुवृत्तं भवति । तृतीयायां पङ्क्तौ द्वयक्षरस्य प्रस्तारः । तत्रैकं सर्वगुरु, द्वे एकलघुनी, एकं सर्वलघ्विति कोष्ठक्रमेण वृत्तानि भवन्ति ॥ चतुर्थ्यां पङ्क्तौ त्र्यक्षरस्य प्रस्तारः । तत्रैकं सर्वगुरु त्रीण्येकलधूनि त्रीणि द्विलघूनि एकं सर्वलघु ॥ तथा पञ्चमादिपङ्क्तावपि सर्वगुर्वादिसर्वलघ्वन्तमेकद्वयादिलघु द्रष्टव्यमिति ॥\nषष्ठप्रत्ययोऽप्यध्वपरिच्छित्तिरित्येके । सोऽत्यल्पत्वात्‌ पुरुषेच्छाविधायित्वेनानियतत्वाच्च नोक्तः । एवं प्रत्ययसमासः समाप्तः ॥ पिङ्गलाचार्यरचिते छन्दःशास्त्रे हलायुधः । मृतसंजीविनीं नाम वृत्ति निर्मितवानिमाम्‌ ।।","t":""}]};

  8: { dev:"अष्टमोऽध्यायः",  iast:"Aṣṭamo'dhyāyaḥ",   topic:"प्रत्ययप्रकरणम् — Combinatorics & Binary Algorithms" },
};

// index by adhyaya
const BY_ADHYAYA = {};
for (const s of SUTRAS) {
  if (!BY_ADHYAYA[s.a]) BY_ADHYAYA[s.a] = [];
  BY_ADHYAYA[s.a].push(s);
}

// flat index for prev/next
const FLAT = [...SUTRAS]; // already sorted
let currentSutraIdx = 0;
let currentAdhyaya = 1;

// ═══════════════════════════════════════════════════════
// SPLASH SHLOKAS (Halayudha mangalacharana)
// ═══════════════════════════════════════════════════════
function renderSplash() {
  const lines = [
    "नमस्तुङ्गशिरश्चुम्बिचन्द्रचामरचारवे ।",
    "त्रैलोक्यनगरारम्भमूलस्तम्भाय शम्भवे ॥ १ ॥",
    "",
    "श्रीमत्पिङ्गलनागोक्तच्छन्दःशास्त्रमहोदधेः ।",
    "वृत्तानि मौक्तिकानीव कानिचिदिचिनोम्यहम् ॥ २ ॥",
    "",
    "वेदानां प्रथमाङ्गस्य कवीनां नयनस्य च ।",
    "पिङ्गलाचार्यसूत्रस्य मया वृत्तिर्विधास्यते ॥ ३ ॥",
    "",
    "क्षीराब्धेरमृतं यद्वद्धृतं देवदानवैः ।",
    "छन्दोऽब्धेः पिङ्गलाचार्यच्छन्दोऽमृतं तथोद्धृतम् ॥ ४ ॥",
  ];
  document.getElementById('splash-shlokas').innerHTML =
    lines.map(l => l ? `<span class="shloka-line">${l}</span>` : '<span style="display:block;height:0.6rem"></span>').join('');
}

// ═══════════════════════════════════════════════════════
// ENTER APP
// ═══════════════════════════════════════════════════════
function enterApp() {
  document.getElementById('splash').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  app.style.flexDirection = 'column';
  buildSidebar();
  renderIntroText();
  renderAdhyayaCards();
}

// ═══════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════
function buildSidebar() {
  const nav = document.getElementById('sidebar');
  
    <div class="nav-a" id="nav-home" onclick="showAdhyayaList()">॰ अध्यायसूची</div>`;
  h += `<div class="nav-head">अध्यायाः · Adhyāyāḥ</div>`;
  for (let a = 1; a <= 8; a++) {
    const m = ADHYAYA_META[a];
    const cnt = (BY_ADHYAYA[a]||[]).length;
    h += `<div class="nav-a" id="nav-a${a}" onclick="toggleNavAdhyaya(${a})">
      <span class="nav-num">${a}.</span>${m.dev}</div>
    <div class="nav-sub" id="nav-sub-${a}">`;
    for (const s of (BY_ADHYAYA[a]||[])) {
      h += `<div class="nav-a" id="nav-s${s.a}-${s.n}" onclick="openSutra(${s.a},${s.n})">
        <span class="nav-num">${s.a}.${s.n}</span> ${s.s}</div>`;
    }
    h += `</div>`;
  }
  nav.innerHTML = h;
}

function toggleNavAdhyaya(a) {
  // Close others
  for (let i=1;i<=8;i++) {
    if (i!==a) document.getElementById('nav-sub-'+i)?.classList.remove('open');
  }
  document.getElementById('nav-sub-'+a)?.classList.toggle('open');
  showSutraList(a);
}

function setNavActive(id) {
  document.querySelectorAll('#sidebar .nav-a').forEach(el=>el.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

// ═══════════════════════════════════════════════════════
// ADHYAYA LIST
// ═══════════════════════════════════════════════════════
function renderIntroText() {
  // Show first 2 sentences of halayudha intro prose
  const prose = INTRO.split('\n').filter(l=>l.trim() && !l.includes('॥')).slice(0,2).join(' ');
  document.getElementById('intro-text').textContent = prose.substring(0,300) + '…';
}

function renderAdhyayaCards() {
  const ROMAN = ['I','II','III','IV','V','VI','VII','VIII'];
  let h = '';
  for (let a=1;a<=8;a++) {
    const m = ADHYAYA_META[a];
    const cnt = (BY_ADHYAYA[a]||[]).length;
    h += `<div class="adhyaya-card" onclick="showSutraList(${a})">
      <div class="ac-num">${ROMAN[a-1]}</div>
      <div class="ac-body">
        <div class="ac-dev">${m.dev}</div>
        <div class="ac-iast">${m.iast}</div>
        <div class="ac-topic">${m.topic}</div>
      </div>
      <div class="ac-count">${cnt} सूत्राणि</div>
    </div>`;
  }
  document.getElementById('adhyaya-cards').innerHTML = h;
}

function showAdhyayaList() {
  showView('view-adhyaya-list');
  setNavActive('nav-home');
}

// ═══════════════════════════════════════════════════════
// SUTRA LIST
// ═══════════════════════════════════════════════════════
function showSutraList(a) {
  currentAdhyaya = a;
  const m = ADHYAYA_META[a];
  const sutras = BY_ADHYAYA[a] || [];
  document.getElementById('bc-adhyaya').textContent = m.dev;
  document.getElementById('sl-title').textContent = m.dev;
  document.getElementById('sl-sub').textContent = `${m.iast} · ${m.topic}`;
  let h = '';
  for (const s of sutras) {
    const tag = s.p ? `<span class="sr-type">${s.p}</span>` : '';
    h += `<div class="sutra-row" onclick="openSutra(${s.a},${s.n})">
      <div class="sr-num">${s.a}.${s.n}</div>
      <div class="sr-sutra">${s.s}${tag}</div>
    </div>`;
  }
  document.getElementById('sutra-rows').innerHTML = h;
  showView('view-sutra-list');
  setNavActive('nav-a'+a);
  document.getElementById('nav-sub-'+a)?.classList.add('open');
  document.getElementById('main').scrollTop = 0;
}

// ═══════════════════════════════════════════════════════
// SINGLE SUTRA
// ═══════════════════════════════════════════════════════
function openSutra(a, n) {
  const idx = FLAT.findIndex(s=>s.a===a && s.n===n);
  if (idx<0) return;
  currentSutraIdx = idx;
  renderSutra(idx);
}

function renderSutra(idx) {
  const s = FLAT[idx];
  const m = ADHYAYA_META[s.a];

  // breadcrumb
  document.getElementById('bc2-adhyaya').textContent = m.dev;
  document.getElementById('bc2-adhyaya').onclick = () => showSutraList(s.a);
  document.getElementById('bc2-sutra').textContent = `${s.a}.${s.n}`;

  // header
  document.getElementById('sv-ref').innerHTML = `${s.a}.${s.n}<br><span style="font-size:0.6rem;color:var(--ink-muted);letter-spacing:0.05em">${m.iast.split("'")[0]}</span>`;
  const tag = s.p ? `<span class="prakar">${s.p}</span>` : '';
  document.getElementById('sv-sutra').innerHTML = s.s + tag;

  // sections
  let sec = '';

  // पदच्छेद
  sec += block('पदच्छेदः', 'Pada-cchedaḥ', s.pc, '', false);

  // अनुवृत्ति
  sec += block('अनुवृत्तिः', 'Anuvṛttiḥ', s.av, 'anuvr', false);

  // अधिकार
  sec += block('अधिकारः', 'Adhikāraḥ', s.ad, 'adhikara', false);

  // हलायुध
  sec += block('मृतसञ्जीवनी — हलायुधभट्टविरचिता', "Mṛtasañjīvanī — Halāyudha Bhaṭṭa", s.h, 'tika', true);

  // टिप्पणी
  if (s.t) sec += block('टिप्पण्यः', 'Ṭippaṇyaḥ', s.t, '', false);

  document.getElementById('sv-sections').innerHTML = sec;

  // nav arrows
  document.getElementById('btn-prev').disabled = idx===0;
  document.getElementById('btn-next').disabled = idx===FLAT.length-1;

  showView('view-sutra');
  setNavActive(`nav-s${s.a}-${s.n}`);
  document.getElementById('main').scrollTop = 0;
}

function block(dev, iast, text, cls, required) {
  if (!text && !required) return '';
  const content = text
    ? `<div class="s-content ${cls}">${text.replace(/\n/g,'<br>')}</div>`
    : `<div class="s-empty">—</div>`;
  return `<div class="s-section">
    <div class="s-label" title="${iast}">${dev}</div>
    ${content}
  </div>`;
}

function navSutra(dir) {
  const next = currentSutraIdx + dir;
  if (next<0 || next>=FLAT.length) return;
  currentSutraIdx = next;
  renderSutra(next);
}

// ═══════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════
function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const ql = q.toLowerCase();
  const hits = SUTRAS.filter(s =>
    s.s.includes(q) || s.pc.includes(q) || s.av.includes(q) ||
    s.h.toLowerCase().includes(ql) || s.p.includes(q)
  );
  document.getElementById('sr-title').textContent = `खोज-परिणामाः · Search Results`;
  document.getElementById('sr-sub').textContent = `"${q}" — ${hits.length} परिणामाः`;
  const hl = t => t.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
  let h = '';
  if (!hits.length) {
    h = '<p style="color:var(--ink-muted);font-style:italic;font-size:0.95rem">कोऽपि सूत्रो न प्राप्तः — No sūtra found.</p>';
  } else {
    for (const s of hits) {
      const snippet = s.h.substring(0,180).replace(/\n/g,' ');
      h += `<div class="sr-result" onclick="openSutra(${s.a},${s.n})">
        <div class="res-ref">अध्यायः ${s.a} · सूत्रम् ${s.a}.${s.n} · ${s.p||'—'}</div>
        <div class="res-sutra">${hl(s.s)}</div>
        <div class="res-snippet">${hl(snippet)}…</div>
      </div>`;
    }
  }
  document.getElementById('sr-list').innerHTML = h;
  showView('view-search');
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function showView(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('show'));
  document.getElementById(id)?.classList.add('show');
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
renderSplash();
</script>
